<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Exit Ticket</title>
  <desc id="desc">Single-question exit ticket visual with prompt and sentence frame.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <style>
      .title { font: 700 66px Inter, Arial, sans-serif; fill: #f9fafb; }
      .q { font: 600 40px Inter, Arial, sans-serif; fill: #e5e7eb; }
      .frame { font: 400 30px Inter, Arial, sans-serif; fill: #bfdbfe; }
      .tag { font: 700 26px Inter, Arial, sans-serif; fill: #111827; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <rect x="110" y="80" width="280" height="58" rx="14" fill="#fde68a"/>
  <text x="250" y="118" text-anchor="middle" class="tag">EXIT TICKET</text>

  <text x="120" y="220" class="title">One Question</text>

  <foreignObject x="120" y="270" width="1360" height="260">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font: 600 40px Inter, Arial, sans-serif; color: #e5e7eb; line-height: 1.3;">
      In one sentence, explain the difference between an
      <span style="color:#93c5fd;">agent</span>
      and a
      <span style="color:#93c5fd;">skill</span>
      using this sandbox.
    </div>
  </foreignObject>

  <rect x="120" y="590" width="1360" height="180" rx="20" fill="#1e3a8a" opacity="0.85"/>
  <text x="170" y="655" class="frame">Sentence frame:</text>
  <text x="170" y="710" class="frame">In this sandbox, the agent is ___, and the skills are ___ because ___.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Bridge to Week 2</title>
  <desc id="desc">A visual bridge connecting Week 1 sandbox learning to Week 2 need finding.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <style>
      .title { font: 700 68px Inter, Arial, sans-serif; fill: #f8fafc; }
      .label { font: 700 40px Inter, Arial, sans-serif; fill: #e2e8f0; }
      .note { font: 400 28px Inter, Arial, sans-serif; fill: #cbd5e1; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect y="640" width="1600" height="260" fill="url(#land)"/>

  <text x="800" y="110" text-anchor="middle" class="title">Bridge to Week 2</text>

  <rect x="120" y="540" width="360" height="180" rx="20" fill="#1d4ed8"/>
  <text x="300" y="620" text-anchor="middle" class="label">Week 1</text>
  <text x="300" y="665" text-anchor="middle" class="note">Prompt Quality</text>

  <rect x="1120" y="540" width="360" height="180" rx="20" fill="#0f766e"/>
  <text x="1300" y="620" text-anchor="middle" class="label">Week 2</text>
  <text x="1300" y="665" text-anchor="middle" class="note">Need Finding</text>

  <path d="M450 590 C610 430, 990 430, 1150 590" fill="none" stroke="#93c5fd" stroke-width="24" stroke-linecap="round"/>
  <path d="M450 640 C610 490, 990 490, 1150 640" fill="none" stroke="#60a5fa" stroke-width="16" stroke-linecap="round"/>

  <text x="800" y="450" text-anchor="middle" class="note">What skill will your future CAC app need?</text>
</svg>
